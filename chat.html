<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Чат с MAS PolyMind</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f9fafb;
            margin: 0;
            padding: 0;
        }
        /* Контейнер чата с отступами */
        .chat-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 16px;
        }
        /* Окно сообщений */
        #chat {
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: 20px;
            padding: 16px;
            height: 60vh;
            min-height: 350px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: #e5e7eb;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        /* Поле ввода и кнопка – вертикально */
        .input-group {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #messageInput {
            width: 100%;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #d1d5db;
            background: white;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        #messageInput:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        button {
            width: 100%;
            padding: 14px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.05s;
        }
        button:active {
            transform: scale(0.98);
        }
        button:hover {
            background: #0056b3;
        }

        /* Адаптив для маленьких экранов */
        @media (max-width: 640px) {
            .chat-container {
                padding: 0 12px;
                margin: 12px auto;
            }
            #chat {
                height: 55vh;
                min-height: 300px;
                padding: 12px;
            }
            .message {
                max-width: 90%;
                font-size: 0.9rem;
                padding: 8px 12px;
            }
            #messageInput {
                padding: 12px 16px;
                font-size: 0.95rem;
            }
            button {
                padding: 12px 16px;
                font-size: 0.95rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }

        /* Стили для навигации (чтобы не ломалась на мобильных) */
        nav {
            padding-left: 16px;
            padding-right: 16px;
        }
        .nav-links a {
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Навигация (оставлена без изменений) -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fas fa-robot text-2xl text-blue-600"></i>
                <span class="font-bold text-lg md:text-xl bg-gradient-to-r from-blue-700 to-cyan-600 bg-clip-text text-transparent">AI Agents Ensemble</span>
            </div>
            <div class="hidden md:flex space-x-4 text-gray-600 font-medium">
                <a href="index.html#architecture" class="hover:text-blue-600 transition">Архитектура</a>
                <a href="index.html#agents" class="hover:text-blue-600 transition">Агенты</a>
                <a href="index.html#tech-stack" class="hover:text-blue-600 transition">Технологии</a>
                <a href="index.html#workflow" class="hover:text-blue-600 transition">Рабочий процесс</a>
                <a href="index.html#roadmap" class="hover:text-blue-600 transition">Дорожная карта</a>
                <a href="chat.html" class="hover:text-blue-600 transition flex items-center gap-1">
                    <i class="fas fa-comment-dots"></i> Чат
                </a>
            </div>
            <a href="index.html#features" class="hidden md:block bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full text-sm font-semibold shadow-md transition">Демонстрация</a>
            <!-- Мобильное меню для chat.html (краткое, можно при желании расширить) -->
            <div class="md:hidden">
                <a href="index.html" class="text-blue-600 text-sm font-medium">← На главную</a>
            </div>
        </div>
    </nav>

    <!-- Основной блок чата -->
    <div class="chat-container">
        <h2 class="text-2xl md:text-3xl font-bold mb-4 text-gray-800">
            Чат с MAS PolyMind 
            <sup style="font-size: 0.7rem; font-weight: normal; color: #6b7280;">beta</sup>
        </h2>
        <div id="chat"></div>
        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Введите ваш запрос..." autocomplete="off">
            <button onclick="sendMessage()">
                <i class="fas fa-paper-plane mr-2"></i> Отправить
            </button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://polymind.ddns.net'; // Измените на адрес вашего сервера
        let ws = null;
        let currentTaskId = null;

        function addMessage(text, sender) {
            const chat = document.getElementById('chat');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            chat.appendChild(messageDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            ws = new WebSocket(`ws://localhost:8080/ws`);
            ws.onopen = () => {
                console.log('WebSocket connected');
                addMessage('✅ Подключение к серверу установлено', 'bot');
            };
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.message) {
                        addMessage(data.message, 'bot');
                    }
                } catch (e) {
                    console.error('WebSocket message error:', e);
                }
            };
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addMessage('⚠️ Ошибка WebSocket, переподключение...', 'bot');
            };
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                setTimeout(connectWebSocket, 3000);
            };
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            fetch(`${API_BASE}/api/message`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: message })
            })
            .then(response => response.json())
            .then(data => {
                if (data.task_id) {
                    currentTaskId = data.task_id;
                    addMessage('✅ Запрос принят в обработку. Ожидайте результат...', 'bot');
                } else {
                    addMessage('❌ Ошибка при отправке запроса', 'bot');
                }
            })
            .catch(error => {
                console.error('API error:', error);
                addMessage('❌ Ошибка соединения с сервером. Убедитесь, что бэкенд запущен.', 'bot');
            });
        }

        window.addEventListener('load', connectWebSocket);
    </script>
</body>
</html>
