<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат с AI агентами</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 0 auto; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .message { margin: 5px 0; padding: 8px; border-radius: 8px; }
        .user { background: #007bff; color: white; text-align: right; }
        .bot { background: #e9ecef; text-align: left; }
        #inputArea { display: flex; gap: 10px; }
        #messageInput { flex: 1; padding: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        * { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: #f9fafb; }
        .gradient-bg {
            background: radial-gradient(circle at 10% 20%, rgba(0, 102, 204, 0.05) 0%, rgba(0, 0, 0, 0) 80%);
        }
        .card-hover {
            transition: all 0.25s ease;
        }
        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.1);
        }
        .agent-badge {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .code-bg {
            background: #0f172a;
        }
        .border-glow {
            border-image: linear-gradient(95deg, #3b82f6, #06b6d4) 1;
        }
        .tech-icon {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
    </style>
</head>
<body>

        <!-- Header / Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-3 flex flex-wrap items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fas fa-robot text-2xl text-blue-600"></i>
                <span class="font-bold text-xl bg-gradient-to-r from-blue-700 to-cyan-600 bg-clip-text text-transparent">AI Agents Ensemble</span>
            </div>
            <div class="hidden md:flex space-x-6 text-gray-600 font-medium">
                <a href="#architecture" class="hover:text-blue-600 transition">Архитектура</a>
                <a href="#agents" class="hover:text-blue-600 transition">Агенты</a>
                <a href="#tech-stack" class="hover:text-blue-600 transition">Стек</a>
                <a href="#workflow" class="hover:text-blue-600 transition">Поток данных</a>
                <a href="#roadmap" class="hover:text-blue-600 transition">Планы</a>
                <a href="chat.html" class="hover:text-blue-600 transition flex items-center gap-1">
                <i class="fas fa-comment-dots"></i> Чат
            </div>
            <a href="#features" class="hidden md:block bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-semibold shadow-md transition">Преимущества</a>
        </div>
    </nav>
    <h2>Чат с AI ассистентом</h2>
    <div id="chat"></div>
    <div id="inputArea">
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        const BOT_TOKEN = 'ВАШ_BOT_TOKEN';
        const CHAT_ID = 'ВАШ_CHAT_ID';

        function addMessage(text, sender) {
            const chat = document.getElementById('chat');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            chat.appendChild(messageDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const data = {
                chat_id: CHAT_ID,
                text: `Новое сообщение от пользователя:\n\n${message}`
            };

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    addMessage('Ваше сообщение отправлено агентам!', 'bot');
                } else {
                    addMessage('Ошибка при отправке. Попробуйте позже.', 'bot');
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                addMessage('Ошибка соединения. Проверьте консоль.', 'bot');
            });
        }
    </script>
</body>
</html>
