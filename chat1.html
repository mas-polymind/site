<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат с AI агентами</title>
    <!-- Подключаем Tailwind и Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Ваши дополнительные стили (сообщения, анимации и т.д.) */
        body { font-family: 'Inter', sans-serif; background: #f9fafb; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: white; border-radius: 12px; }
        .message { margin: 5px 0; padding: 8px 12px; border-radius: 18px; max-width: 80%; }
        .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; text-align: right; }
        .bot { background: #e9ecef; text-align: left; }
        #inputArea { display: flex; gap: 10px; margin-top: 10px; }
        #messageInput { flex: 1; padding: 10px; border-radius: 24px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 24px; cursor: pointer; }
    </style>
</head>
<body>

<!-- Навигация (исправленная) -->
<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-3 flex flex-wrap items-center justify-between">
        <div class="flex items-center space-x-2">
            <i class="fas fa-robot text-2xl text-blue-600"></i>
            <span class="font-bold text-xl bg-gradient-to-r from-blue-700 to-cyan-600 bg-clip-text text-transparent">AI Agents Ensemble</span>
        </div>
        <div class="hidden md:flex space-x-6 text-gray-600 font-medium">
            <a href="index.html#architecture" class="hover:text-blue-600 transition">Архитектура</a>
            <a href="index.html#agents" class="hover:text-blue-600 transition">Агенты</a>
            <a href="index.html#tech-stack" class="hover:text-blue-600 transition">Стек</a>
            <a href="index.html#workflow" class="hover:text-blue-600 transition">Поток данных</a>
            <a href="index.html#roadmap" class="hover:text-blue-600 transition">Планы</a>
            <a href="chat.html" class="hover:text-blue-600 transition flex items-center gap-1">
                <i class="fas fa-comment-dots"></i> Чат
            </a>
        </div>
        <a href="index.html#features" class="hidden md:block bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-semibold shadow-md transition">Преимущества</a>
    </div>
</nav>

<!-- Контейнер чата -->
<div class="max-w-2xl mx-auto mt-8 p-4">
    <h2 class="text-2xl font-bold mb-4">Чат с AI ассистентом</h2>
    <div id="chat"></div>
    <div id="inputArea">
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>
</div>

<script>
    const BOT_TOKEN = 'ВАШ_BOT_TOKEN';
    const CHAT_ID = 'ВАШ_CHAT_ID';

    function addMessage(text, sender) {
        const chat = document.getElementById('chat');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageDiv.innerText = text;
        chat.appendChild(messageDiv);
        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        if (!message) return;

        addMessage(message, 'user');
        input.value = '';

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const data = {
            chat_id: CHAT_ID,
            text: `Новое сообщение от пользователя:\n\n${message}`
        };

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => {
            if (data.ok) {
                addMessage('Ваше сообщение отправлено агентам!', 'bot');
            } else {
                addMessage('Ошибка при отправке. Попробуйте позже.', 'bot');
            }
        })
        .catch(error => {
            console.error('Ошибка:', error);
            addMessage('Ошибка соединения. Проверьте консоль.', 'bot');
        });
    }
</script>
</body>
</html>
